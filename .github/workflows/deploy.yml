name: Deploy to Oracle Cloud

# Запускаем только при пуше в ветку main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: скачиваем код репозитория на виртуальную машину GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 2: настраиваем SSH-агент с нашим приватным ключом
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Шаг 3: добавляем сервер в known_hosts (чтобы SSH не спрашивал "доверять ли хосту?")
      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # Шаг 4: подключаемся к серверу и запускаем deploy.sh
      - name: Deploy
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "~/deploy.sh"